name: MLflow CI Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas numpy scikit-learn joblib matplotlib

      - name: Initialize conda
        run: conda init bash

      - name: Debug folder structure
        run: ls -R

      - name: Run MLflow Project
        shell: bash -l {0}
        run: |
          cd MLProject
          mlflow run . -e train

      - name: Check outputs
        run: |
          ls MLProject/outputs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: MLProject/outputs/

      - name: Clean Docker cache
        run: |
          docker system prune -a -f

      - name: Build Docker Image
        run: |
          cd MLProject
          mlflow models build-docker -m "outputs/mlflow_model" -n "fatalities-model"

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: |
          docker tag fatalities-model ${{ secrets.DOCKER_USERNAME }}/fatalities-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fatalities-model:latest
