name: MLflow CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas numpy scikit-learn joblib matplotlib

      # TRAIN
      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . -e train --env-manager=local

      # GET RUN_ID
      - name: Get latest run_id
        run: |
          cd MLProject
          RUN_ID=$(ls -td mlruns/0/*/ | grep -E '[0-9a-f]{32}' | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_ID = $RUN_ID"

      # REGISTER MODEL KE REGISTRY
      - name: Register model
        run: |
          cd MLProject
          mlflow models register \
            --model-uri "runs:/$RUN_ID/model" \
            --name "model"

      # BUILD DOCKER DARI REGISTRY
      - name: Build Docker Image
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "models:/model/latest" \
            --name fatalities-model

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: |
          docker tag fatalities-model ${{ secrets.DOCKER_USERNAME }}/fatalities-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fatalities-model:latest
