name: MLflow CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow pandas numpy scikit-learn joblib matplotlib

      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . -e train --env-manager=local
          mlflow models list

      - name: Build Docker Image
        run: |
          cd MLProject
          mlflow models build-docker \
            --model-uri "models:/model/latest" \
            --name fatalities-model

      - name: Login Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag Docker Image
        run: |
          docker tag fatalities-model ${{ secrets.DOCKER_USERNAME }}/fatalities-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fatalities-model:latest
